<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Global</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="glass-panel">
        <header>
            <h2>Banco Global</h2>
            <p>Aceda à sua conta digital</p>
        </header>
        
        <div class="form-group">
            <label for="cpf">CPF (Login)</label>
            <input type="text" id="cpf" placeholder="Apenas números">
        </div>
        
        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="A sua senha">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="termos">
            <label for="termos">Aceito os Termos de Uso e LGPD</label>
        </div>

        <button onclick="fazerLogin()">Entrar</button>
        <button class="btn-secondary" onclick="cadastrar()">Criar Nova Conta</button>

        <p id="auth-mensagem"></p>
    </div>

    <div id="dashboard-screen" class="glass-panel hidden">
        <h2>Área do Cliente</h2>
        <span class="status-badge" id="open-finance-status">Open Finance: Desconectado</span>
        
        <div class="dashboard-info">
            <p><strong>CPF:</strong> <span id="user-cpf"></span></p>
            <p><strong>Score Interno:</strong> <span id="user-score">500</span></p>
        </div>

        <button onclick="conectarOpenFinance()" style="margin-bottom: 20px;">Sincronizar Open Finance</button>

        <div class="form-group">
            <label for="valor-credito">Simular Crédito (R$)</label>
            <input type="number" id="valor-credito" placeholder="Ex: 5000">
        </div>

        <button onclick="solicitarCredito()">Solicitar Análise</button>
        <button class="btn-secondary" onclick="sair()">Sair</button>

        <p id="dash-mensagem"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
